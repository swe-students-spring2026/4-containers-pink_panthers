version: "3.11"

services:
  web:
    build: ./web-app
    ports:
      - 3000:3000
    environment:
      MONGO_URI: mongodb://mongodb:27017/
      SECRET_KEY: dev
      PORT: 3000
    depends_on:
      - mongodb
    command: python app.py

  ml:
    build: ./machine-learning-client
    environment:
      MONGO_URI: mongodb://mongodb:27017/
      PORT: 5001
    depends_on:
      - mongodb
    command: python main.py

  mongodb:
    image: mongo:latest
    ports:
      - 27017:27017
    volumes:
      - ./db:/data/db