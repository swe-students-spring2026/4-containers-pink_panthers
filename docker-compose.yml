services:
  web:
    build: ./web-app
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/}
      SECRET_KEY: ${SECRET_KEY:-dev}
      PORT: "${WEB_PORT:-3000}"
    depends_on:
      - mongodb
    command: python app.py

  ml:
    build: ./machine-learning-client
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/}
      PORT: "${ML_PORT:-5001}"
    depends_on:
      - mongodb
    command: python main.py

  mongodb:
    image: mongo:latest
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - ./db:/data/db
