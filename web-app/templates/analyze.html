{% extends "base.html" %}
{% block title %}Analyze My Look — FitCheck{% endblock %}

{% block content %}
<h1>Analyze my Look</h1>

<div style="margin-top: 1.5rem; background: #1a1a1a; aspect-ratio: 16/9; overflow: hidden; position: relative;">
    <video id="webcam" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover; display: block;"></video>
    <p id="cam-msg" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #aaa; pointer-events: none;">Click the button to use your camera</p>
</div>
<p style="margin-top: 0.75rem;">
    <button type="button" class="btn" id="cam-start">Start camera</button>
</p>

<script>
(function () {
    var v = document.getElementById("webcam");
    var msg = document.getElementById("cam-msg");
    document.getElementById("cam-start").onclick = function () {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            msg.textContent = "Camera not supported in this browser.";
            return;
        }
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(function (stream) {
                v.srcObject = stream;
                msg.style.display = "none";
            })
            .catch(function () {
                msg.textContent = "Could not access camera.";
                msg.style.display = "flex";
            });
    };
})();
</script>

<div style="margin-top: 1rem; background: #d9d9d9; padding: 1.5rem;">
    <p>Your Colors Are: Color1 &nbsp;&nbsp; Color2 &nbsp;&nbsp; Color3 &nbsp;&nbsp;&nbsp;&nbsp; Your Coordination Result is: ____</p>
</div>
{% endblock %}
